<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{ --bg:#f6f6f6; --ink:#1f2937; --ink2:#2d3643; --lime:#e7ffb3; --line:#e5e7eb; --chk:#f3f3f3; --pad:16px; }
  html,body{ height:100%; }
  body{ font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:#e6e6e6; color:var(--ink); display:flex; justify-content:center; -webkit-font-smoothing:antialiased; }
  #app{ width:100%; min-width:340px; max-width:500px; min-height:100vh; background:var(--bg);
    position:relative; overflow:hidden; box-shadow:0 0 50px rgba(0,0,0,.14); }
  .scroll{ height:100vh; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:96px; }
  .view{ display:none; } .view.active{ display:block; animation:fade .28s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  /* 스쿼클: 뒤에 SVG(채움+Inside 스트로크)를 깔고 내용은 위에 */
  .sq{ position:relative; isolation:isolate; }
  #app.sqready .sq{ background:transparent !important; border:none !important; border-radius:0 !important; }
  .sqbg{ position:absolute !important; left:0 !important; top:0 !important; width:100% !important; height:100% !important; z-index:-1; pointer-events:none; flex:none !important; }

  .chk{ background-image:
      linear-gradient(45deg,var(--chk) 25%,transparent 25%),linear-gradient(-45deg,var(--chk) 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,var(--chk) 75%),linear-gradient(-45deg,transparent 75%,var(--chk) 75%);
    background-size:18px 18px; background-position:0 0,0 9px,9px -9px,-9px 0; background-color:#fff; }

  .home-top{ display:flex; align-items:center; justify-content:space-between; padding:18px var(--pad) 0; height:103px; }
  .home-top.hide{ display:none; }
  .logo-blob{ position:relative; width:120px; height:71px; display:flex; align-items:center; justify-content:center; }
  .logo-blob .b{ position:absolute; background:var(--lime); border:2px solid #9fc04a; border-radius:50%; }
  .logo-blob .b1{ width:78px; height:71px; left:0; top:0; }
  .logo-blob .b2{ width:74px; height:66px; right:0; top:4px; }
  .logo-blob .txt{ position:relative; z-index:2; font-size:30px; font-weight:600; letter-spacing:-1.8px; color:var(--ink); }

  .btn-outline{ display:inline-flex; align-items:center; gap:5px; background:#fff; border:1px solid var(--ink);
    border-radius:14px; padding:10px 12px; font-size:13px; font-weight:500; color:var(--ink2); cursor:pointer; }
  .btn-outline > svg:not(.sqbg){ width:18px; height:18px; }
  .btn-outline:active{ transform:scale(.97); }

  .search-mode{ display:none; align-items:center; gap:8px; padding:18px var(--pad) 0; }
  .search-mode.open{ display:flex; }
  .search-field{ flex:1; display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--ink);
    border-radius:20px; padding:15px 16px; }
  .search-field > svg:not(.sqbg){ width:20px; height:20px; color:var(--ink); flex:0 0 20px; }
  .search-field input{ flex:1; border:none; outline:none; background:none; font-size:14px; color:var(--ink); font-family:inherit; }
  .search-field input::placeholder{ color:#8897ae; }
  .close-btn{ flex:0 0 auto; width:50px; height:50px; display:flex; align-items:center; justify-content:center;
    background:#fff; border:1px solid var(--ink); border-radius:14px; cursor:pointer; }
  .close-btn > svg:not(.sqbg){ width:20px; height:20px; color:var(--ink); }
  .close-btn:active{ transform:scale(.95); }

  .chips{ display:flex; gap:4px; overflow-x:auto; padding:40px var(--pad) 0; scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; padding:9px 14px; background:#fff; border:1px solid var(--line); border-radius:13px;
    font-size:13px; font-weight:500; color:var(--ink); letter-spacing:-.24px; cursor:pointer; white-space:nowrap; }
  .chip .lbl{ position:relative; z-index:2; }
  .chip.active{ background:var(--lime); border-color:var(--ink); }
  .chip:active{ transform:scale(.96); }

  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:16px var(--pad) 0; }
  .stk{ aspect-ratio:1/1; border:1px solid var(--ink); border-radius:24px; overflow:hidden; cursor:pointer;
    display:flex; align-items:center; justify-content:center; }
  .stk:active{ transform:scale(.95); }
  .stk .pic{ position:absolute; inset:12px; object-fit:contain; width:calc(100% - 24px); height:calc(100% - 24px); z-index:2; }
  .stk .fallback{ position:relative; z-index:2; font-size:42px; display:none; }

  .detail-wrap{ padding:16px var(--pad) 0; }
  .hero{ margin-top:12px; border:1px solid var(--ink); border-radius:28px; overflow:hidden; height:344px;
    display:flex; align-items:center; justify-content:center; }
  .hero .pic{ position:absolute; inset:10px; object-fit:contain; width:calc(100% - 20px); height:calc(100% - 20px); z-index:2; }
  .hero .fallback{ position:relative; z-index:2; font-size:150px; display:none; }
  .detail-row{ display:flex; align-items:center; justify-content:space-between; margin-top:16px; gap:12px; }
  .detail-row .name{ font-size:13px; font-weight:500; color:var(--ink2); letter-spacing:-.26px; }
  .copy-btn{ flex:0 0 auto; background:var(--lime); border:1px solid var(--ink); border-radius:14px;
    padding:12px 24px; font-size:15px; font-weight:600; color:var(--ink2); cursor:pointer; }
  .copy-btn .lbl{ position:relative; z-index:2; }
  .copy-btn:active{ transform:scale(.97); }
  .explore-head{ padding:24px var(--pad) 0; font-size:12px; font-weight:500; color:var(--ink); letter-spacing:-.24px; }

  .fab{ position:absolute; right:16px; bottom:24px; width:52px; height:52px; display:flex; align-items:center; justify-content:center;
    background:#fff; border:1px solid var(--ink); border-radius:14px; cursor:pointer; z-index:40;
    opacity:0; transform:translateY(10px); pointer-events:none; transition:opacity .2s, transform .2s; }
  .fab.show{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .fab > svg:not(.sqbg){ width:22px; height:22px; color:var(--ink); }
  .fab:active{ transform:scale(.94); }

  .toast{ position:absolute; left:50%; bottom:28px; transform:translateX(-50%) translateY(16px);
    background:var(--lime); border:1px solid var(--ink); color:var(--ink2); padding:11px 20px; border-radius:14px;
    font-size:14px; font-weight:600; opacity:0; transition:opacity .12s,transform .12s; pointer-events:none; z-index:50; }
  .toast .lbl{ position:relative; z-index:2; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>

STK.forEach(function(s,i){ s.id=i+1; s.copy_count=9000-i*137; s.created=i+1; });

var CHIPS=['HOT','NEW','Summer Vive','Mono','Text','Food','Electric'];
function pad(n){ return String(n).padStart(3,'0'); }

function cardHtml(s){
  return '<div class="stk chk sq" data-r="24" data-fill="checker" onclick="openDetail(\''+s.id+'\')">'+
    '<img class="pic" src="'+s.u+'" alt="'+s.n+'" onerror="this.style.display=\'none\';this.parentNode.querySelector(\'.fallback\').style.display=\'block\';">'+
    '<span class="fallback">'+(s.e||'🖼️')+'</span></div>';
}
function sq(){ requestAnimationFrame(function(){ if(window.applyAllSquircles) window.applyAllSquircles(); }); }

var active='HOT';
function buildChips(){
  document.getElementById('chips').innerHTML=CHIPS.map(function(c){
    var on=(c===active);
    return '<div class="chip sq'+(on?' active':'')+'" data-r="13" data-fill="'+(on?'#e7ffb3':'#ffffff')+'" data-stroke="'+(on?'#1f2937':'#e5e7eb')+'" onclick="selChip(\''+c+'\',this)"><span class="lbl">'+c+'</span></div>';
  }).join('');
}
function selChip(c,el){ active=c; buildChips(); renderHome(); }

/* 칩별 목록: HOT=복사수순, NEW=최신순, 나머지=카테고리 */
function listFor(){
  var l=STK.slice();
  if(active==='HOT') l.sort(function(a,b){return (b.copy_count||0)-(a.copy_count||0);});
  else if(active==='NEW') l.sort(function(a,b){return (b.created||b.id)-(a.created||a.id);});
  else l=l.filter(function(s){return s.c===active;});
  return l;
}

var homeBase=[], homeIdx=0;
function renderHome(){
  var q=document.getElementById('searchInput').value.trim();
  var l=listFor();
  if(q) l=l.filter(function(s){return (s.n||'').indexOf(q)>=0 || (s.c||'').toLowerCase().indexOf(q.toLowerCase())>=0;});
  homeBase=l;
  document.getElementById('homeGrid').innerHTML=l.map(cardHtml).join('');
  homeIdx=l.length; sq();
}
function appendHome(){
  if(!homeBase.length) return;
  var html=''; for(var i=0;i<9;i++){ html+=cardHtml(homeBase[homeIdx%homeBase.length]); homeIdx++; }
  document.getElementById('homeGrid').insertAdjacentHTML('beforeend',html); sq();
}

function openSearch(){ document.getElementById('homeTop').classList.add('hide'); document.getElementById('searchMode').classList.add('open'); sq(); setTimeout(function(){document.getElementById('searchInput').focus();},40); }
function closeSearch(){ var i=document.getElementById('searchInput'); i.value=''; document.getElementById('searchMode').classList.remove('open'); document.getElementById('homeTop').classList.remove('hide'); renderHome(); }
document.getElementById('searchInput').addEventListener('input',renderHome);

var currentView='home';
function show(v){ document.querySelectorAll('.view').forEach(function(x){x.classList.remove('active');}); document.getElementById('view-'+v).classList.add('active'); document.getElementById('scroll').scrollTop=0; currentView=v; toggleFab(); sq(); }
function goHome(){ show('home'); }

var curDetail=null, relBase=[], relIdx=0;
function findSticker(id){ for(var i=0;i<STK.length;i++) if(String(STK[i].id)===String(id)) return STK[i]; return null; }
function openDetail(id){
  var s=findSticker(id); if(!s) return; curDetail=s;
  var pic=document.getElementById('heroPic'), fb=document.getElementById('heroFb');
  pic.style.display='block'; fb.style.display='none'; fb.textContent=s.e||'🖼️';
  pic.onerror=function(){ pic.style.display='none'; fb.style.display='block'; };
  pic.src=s.u; pic.alt=s.n;
  document.getElementById('detailName').textContent=(s.n||'스티커')+'_'+pad(typeof s.id==='number'?s.id:1);
  relBase=STK.filter(function(x){return String(x.id)!==String(s.id);});
  document.getElementById('relatedGrid').innerHTML=relBase.map(cardHtml).join('');
  relIdx=relBase.length; show('detail');
}
function appendRelated(){
  if(!relBase.length) return;
  var html=''; for(var i=0;i<9;i++){ html+=cardHtml(relBase[relIdx%relBase.length]); relIdx++; }
  document.getElementById('relatedGrid').insertAdjacentHTML('beforeend',html); sq();
}

var scrollEl=document.getElementById('scroll');
function toggleFab(){ document.getElementById('topBtn').classList.toggle('show', scrollEl.scrollTop>300); }
function goTop(){ scrollEl.scrollTo({top:0,behavior:'smooth'}); }
scrollEl.addEventListener('scroll',function(){
  toggleFab();
  if(scrollEl.scrollTop+scrollEl.clientHeight < scrollEl.scrollHeight-300) return;
  if(currentView==='home') appendHome(); else if(currentView==='detail') appendRelated();
});

function emojiPng(emoji){ return new Promise(function(res){ var sz=512,c=document.createElement('canvas'); c.width=sz;c.height=sz; var x=c.getContext('2d'); x.clearRect(0,0,sz,sz); x.font=Math.floor(sz*0.72)+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif'; x.textAlign='center'; x.textBaseline='middle'; x.fillText(emoji||'🖼️',sz/2,sz/2+sz*0.04); c.toBlob(function(b){res(b);},'image/png'); }); }
async function copySticker(s){
  /* 1) 이미지 클립보드 복사 */
  try{ var r=await fetch(s.u); var blob=await r.blob();
    if(blob.type!=='image/png'){ var bmp=await createImageBitmap(blob); var cv=document.createElement('canvas'); cv.width=bmp.width; cv.height=bmp.height; cv.getContext('2d').drawImage(bmp,0,0); blob=await new Promise(function(rs){cv.toBlob(rs,'image/png');}); }
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]); toast('복사완료!');
  }catch(e){ try{ var b=await emojiPng(s.e); await navigator.clipboard.write([new ClipboardItem({'image/png':b})]); toast('복사완료!'); }catch(e2){ toast('복사완료!'); } }
  /* 2) 복사수 +1 (Supabase) */
  s.copy_count=(s.copy_count||0)+1;
  if(sb){ try{ await sb.rpc('increment_copy',{ p_id:s.id }); }catch(e3){ console.warn('count fail',e3); } }
  if(active==='HOT' && currentView==='home') renderHome();
}
document.getElementById('copyBtn').onclick=function(){ if(curDetail) copySticker(curDetail); };

var tt=null;
function toast(m){ var t=document.getElementById('toast'); t.querySelector('.lbl').textContent=m; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(function(){t.classList.remove('show');},1600); }

/* ===== Supabase에서 실제 스티커 불러오기 ===== */
async function loadSupabase(){
  if(!SB_URL || !SB_KEY) return;            // 미설정이면 더미 유지
  try{
    var mod=await import("https://esm.sh/@supabase/supabase-js@2");
    sb=mod.createClient(SB_URL,SB_KEY);
    var res=await sb.from('stickers').select('*').order('created_at',{ascending:false});
    if(res.error) throw res.error;
    STK=(res.data||[]).map(function(r){
      return { id:r.id, n:r.name||r.image_path, c:catFromFile(r.image_path),
               u:publicUrl(r.image_path), e:'🖼️',
               copy_count:r.copy_count||0, created:Date.parse(r.created_at)||r.id };
    });
    buildChips(); renderHome();
  }catch(e){ console.warn('Supabase 불러오기 실패 → 더미 사용', e); }
}

buildChips(); renderHome(); loadSupabase();
</script>

<script type="module">
import { getSvgPath } from "https://esm.sh/figma-squircle@0.3.1";
var NS="http://www.w3.org/2000/svg", uid=0;
function buildPattern(svg,id){
  var defs=document.createElementNS(NS,'defs');
  var pat=document.createElementNS(NS,'pattern');
  pat.setAttribute('id',id); pat.setAttribute('width','18'); pat.setAttribute('height','18'); pat.setAttribute('patternUnits','userSpaceOnUse');
  function rect(x,y,w,h,f){ var r=document.createElementNS(NS,'rect'); r.setAttribute('x',x); r.setAttribute('y',y); r.setAttribute('width',w); r.setAttribute('height',h); r.setAttribute('fill',f); return r; }
  pat.appendChild(rect(0,0,18,18,'#ffffff'));
  pat.appendChild(rect(0,0,9,9,'#f3f3f3'));
  pat.appendChild(rect(9,9,9,9,'#f3f3f3'));
  defs.appendChild(pat); svg.appendChild(defs);
}
function apply(){
  var app=document.getElementById('app'); if(app) app.classList.add('sqready');
  document.querySelectorAll('.sq').forEach(function(el){
    var r=parseFloat(el.getAttribute('data-r')||'0');
    var w=el.offsetWidth, h=el.offsetHeight; if(!w||!h) return;
    var sw=1.4;
    var full=getSvgPath({width:w,height:h,cornerRadius:r,cornerSmoothing:1});
    var ins=getSvgPath({width:Math.max(0,w-sw),height:Math.max(0,h-sw),cornerRadius:Math.max(0,r-sw/2),cornerSmoothing:1});
    var fillVal=el.getAttribute('data-fill')||'#ffffff';
    var svg=el.querySelector(':scope > svg.sqbg');
    if(!svg){
      el._id=++uid;
      svg=document.createElementNS(NS,'svg'); svg.setAttribute('class','sqbg'); svg.setAttribute('preserveAspectRatio','none'); svg.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;z-index:-1;pointer-events:none;';
      if(fillVal==='checker') buildPattern(svg,'chk'+el._id);
      var fp=document.createElementNS(NS,'path'); fp.setAttribute('class','fp'); svg.appendChild(fp);
      var g=document.createElementNS(NS,'g'); var sp=document.createElementNS(NS,'path'); sp.setAttribute('class','sp'); g.appendChild(sp); svg.appendChild(g);
      el.appendChild(svg);
    }
    svg.setAttribute('viewBox','0 0 '+w+' '+h);
    var fp=svg.querySelector('.fp'); fp.setAttribute('d',full);
    fp.setAttribute('fill', fillVal==='checker' ? ('url(#chk'+el._id+')') : fillVal);
    var g=svg.querySelector('g'); g.setAttribute('transform','translate('+(sw/2)+','+(sw/2)+')');
    var sp=svg.querySelector('.sp'); sp.setAttribute('d',ins); sp.setAttribute('fill','none');
    sp.setAttribute('stroke', el.getAttribute('data-stroke')||'#1f2937'); sp.setAttribute('stroke-width', String(sw));
  });
}
window.applyAllSquircles=apply;
apply();
window.addEventListener('load',function(){ apply(); setTimeout(apply,300); });
var rt=null; window.addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(apply,120); });
</script>
